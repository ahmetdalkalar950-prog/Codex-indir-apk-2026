<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Terminal v2.713</title>
    <style>
        /* Matrix/Hacker Teması Ayarları */
        body { 
            background-color: #000; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            background-image: radial-gradient(circle, #001a00 0%, #000 80%);
        }

        .terminal-box { 
            width: 90%; 
            max-width: 450px; 
            background: rgba(0, 0, 0, 0.9); 
            border: 2px solid #00ff00; 
            padding: 25px; 
            border-radius: 5px; 
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
            position: relative;
        }

        /* Yanıp Sönen İmleç Efekti */
        .cursor { display: inline-block; width: 10px; height: 18px; background: #00ff00; animation: blink 0.8s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        h1 { font-size: 20px; border-bottom: 1px solid #00ff00; padding-bottom: 10px; text-shadow: 0 0 10px #00ff00; }

        .btn { 
            background: none; 
            color: #00ff00; 
            border: 2px solid #00ff00; 
            padding: 15px; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover { 
            background: #00ff00; 
            color: #000; 
            box-shadow: 0 0 20px #00ff00;
        }

        .loader-bar { width: 0%; height: 5px; background: #00ff00; margin-top: 15px; transition: width 0.5s; }
        #status-msg { font-size: 14px; margin-top: 10px; color: #88ff88; }
    </style>
</head>
<body>

<div class="terminal-box">
    <h1>C:\SYSTEM\CODEX_V2.713 >_<span class="cursor"></span></h1>
    <p>> root@official: setup_download.exe</p>
    <p>> [INFO] Server: Secure</p>
    <p>> [INFO] Status: Ready</p>

    <div id="loader-container" style="display:none;">
        <div class="loader-bar" id="myBar"></div>
        <p id="status-msg">Initalizing...</p>
    </div>

    <button class="btn" id="dlBtn" onclick="hackerDownload()">[ DOSYAYI İNDİR ]</button>
</div>

<script>
    function hackerDownload() {
        const btn = document.getElementById('dlBtn');
        const loader = document.getElementById('loader-container');
        const bar = document.getElementById('myBar');
        const msg = document.getElementById('status-msg');

        btn.style.display = 'none';
        loader.style.display = 'block';

        let width = 0;
        let interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                msg.innerHTML = "REDIRECTING TO SOURCE...";
                setTimeout(() => {
                    // GOFILE LİNKİN BURAYA GELECEK
                    window.location.href = "https://gofile.io/d/a3kFnT";
                }, 1000);
            } else {
                width += 10; 
                bar.style.width = width + '%';
                if(width == 30) msg.innerHTML = "Bypassing firewalls...";
                if(width == 60) msg.innerHTML = "Fetching secure link...";
                if(width == 90) msg.innerHTML = "Success! Starting...";
            }
        }, 400);
    }
</script>

</body>
</html>
