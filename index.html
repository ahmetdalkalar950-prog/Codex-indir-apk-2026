<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Official Download</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; background: #1e1e1e; padding: 30px; border-radius: 20px; border: 2px solid #a855f7; width: 90%; max-width: 400px; box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
        h1 { color: #a855f7; margin-bottom: 10px; }
        .loader { border: 4px solid #333; border-top: 4px solid #a855f7; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { background-color: #a855f7; color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 20px; text-decoration: none; display: inline-block; }
        .btn:hover { background-color: #9333ea; transform: scale(1.05); }
        .info { background: #2a2a2a; padding: 15px; border-radius: 10px; font-size: 14px; text-align: left; margin-top: 20px; border-left: 4px solid #a855f7; }
        #status { margin-top: 15px; font-weight: bold; color: #ccc; }
    </style>
</head>
<body>

<div class="container" id="mainBox">
    <h1>CODEX EXECUTOR</h1>
    <p>Resmi İndirme Sayfası</p>
    
    <div class="info">
        <b>Nasıl Kurulur?</b><br>
        1. Butona bas ve 5 saniye bekle.<br>
        2. Gofile'da sağdaki <b>Download</b>'a tıkla.<br>
        3. APK'yı kur ve Roblox'u aç!
    </div>

    <div id="loader" class="loader"></div>
    <p id="status"></p>

    <button class="btn" id="downloadBtn" onclick="startDownload()">BURAYA TIKLA VE İNDİR</button>
</div>

<script>
    function startDownload() {
        const btn = document.getElementById('downloadBtn');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        
        btn.style.display = 'none';
        loader.style.display = 'block';
        status.innerHTML = "Güvenli bağlantı kuruluyor...";

        setTimeout(() => {
            status.innerHTML = "Dosya doğrulanıyor (v2.713)...";
        }, 2000);

        setTimeout(() => {
            status.innerHTML = "Yönlendiriliyorsunuz...";
            // SENİN GOFİLE LİNKİN BURAYA GELECEK
            window.location.href = "https://gofile.io/d/a3kFnT";
        }, 5000);
    }
</script>

</body>
</html>
